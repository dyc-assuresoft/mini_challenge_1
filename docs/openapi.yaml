openapi: 3.0.3

info:
  title: Inventory API
  description: API REST para gestionar el inventario de productos de pequeños emprendedores. Permite registrar, consultar, editar, actualizar stock y eliminar productos, además de obtener reportes básicos.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor local de desarrollo

tags:
  - name: Products
    description: Operaciones sobre productos

paths:

  /products:
    get:
      tags: [Products]
      summary: Listar todos los productos
      operationId: getAllProducts
      responses:
        '200':
          description: Lista de productos obtenida exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: Registrar un nuevo producto
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
            example:
              name: "Polo básico blanco"
              price: 25.00
              stock: 40
              category: "ropa"
      responses:
        '201':
          description: Producto registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Datos inválidos (name faltante, price <= 0, stock < 0)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/report:
    get:
      tags: [Products]
      summary: Obtener reporte de inventario
      operationId: getReport
      responses:
        '200':
          description: Reporte obtenido exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
              example:
                totalProducts: 10
                lowStockProducts:
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    name: "Polo básico blanco"
                    stock: 2
                totalInventoryValue: 1250.00

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Products]
      summary: Obtener un producto por ID
      operationId: getProductById
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Products]
      summary: Editar un producto
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Products]
      summary: Eliminar un producto
      operationId: deleteProduct
      responses:
        '204':
          description: Producto eliminado exitosamente
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/{id}/stock:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      tags: [Products]
      summary: Actualizar stock de un producto
      description: Aumenta o reduce el stock según el valor de quantity. Positivo aumenta, negativo reduce. No se permite que el stock resultante sea menor a 0.
      operationId: updateStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockUpdate'
            example:
              quantity: -5
      responses:
        '200':
          description: Stock actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: El stock resultante sería negativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Producto no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:

    Product:
      type: object
      required: [id, name, price, stock, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        name:
          type: string
          example: "Polo básico blanco"
        price:
          type: number
          format: float
          minimum: 0.01
          example: 25.00
        stock:
          type: integer
          minimum: 0
          example: 40
        category:
          type: string
          nullable: true
          example: "ropa"
        createdAt:
          type: string
          format: date-time
          example: "2025-06-25T14:15:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-06-25T14:15:00.000Z"

    ProductInput:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
          example: "Polo básico blanco"
        price:
          type: number
          format: float
          minimum: 0.01
          example: 25.00
        stock:
          type: integer
          minimum: 0
          example: 40
        category:
          type: string
          nullable: true
          example: "ropa"

    StockUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          description: Cantidad a sumar (positivo) o restar (negativo) del stock actual
          example: -5

    Report:
      type: object
      required: [totalProducts, lowStockProducts, totalInventoryValue]
      properties:
        totalProducts:
          type: integer
          description: Total de productos registrados
          example: 10
        lowStockProducts:
          type: array
          description: Productos con stock menor a 5 unidades
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              stock:
                type: integer
        totalInventoryValue:
          type: number
          description: Valor total del inventario (suma de stock × price por producto)
          example: 1250.00

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "El price debe ser mayor a 0"
